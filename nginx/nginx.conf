upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

upstream umami {
    server umami:3000;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=generate:10m rate=2r/m;

server {
    listen 80;
    server_name _;

    # ACME challenge for Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

}

# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name sefariabookcreator.debuggingmadejoyful.tech;

    ssl_certificate /etc/letsencrypt/live/sefariabookcreator.debuggingmadejoyful.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sefariabookcreator.debuggingmadejoyful.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    # Backend API
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Backend health check
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # FastAPI docs
    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # PDF downloads — longer timeout
    location ~* ^/api/v1/jobs/.*/download$ {
        limit_req zone=generate burst=5 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }

    # Umami Analytics dashboard & API
    location /umami/ {
        proxy_pass http://umami/umami/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
